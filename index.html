// ── ErrorBoundary：捕捉 render 錯誤，避免白/黑畫面 ──
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ minHeight:'100vh', background:'#030712', color:'#f87171', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, padding:24, fontFamily:'sans-serif' }}>
        <p style={{ fontSize:18, fontWeight:'bold' }}>⚠ 程式載入錯誤</p>

        <pre style={{ fontSize:11, color:'#6b7280', background:'#111827', padding:12, borderRadius:8, maxWidth:600, overflow:'auto' }}>
          {String(this.state.error)}
        </pre>
      </div>
    );
    return this.props.children;
  }
}

function getSentiment(title='', content='') {
  const t = (title+' '+content).toLowerCase();
  const pos = ['獲獎','營收','新高','成長','獲利','上漲','突破','合作','推出','亮眼','award','growth','record','profit','surge'].filter(k=>t.includes(k)).length;
  const neg = ['虧損','下滑','召回','訴訟','下跌','危機','裁員','倒閉','利空','loss','lawsuit','crash','decline','layoff'].filter(k=>t.includes(k)).length;
  return pos>neg?'positive':neg>pos?'negative':'neutral';
}

function fmtDate(ts) {
  if (!ts) return '';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()}`;
  } catch { return ''; }
}

function sortByDate(arr) {
  return [...arr].sort((a,b) => {
    const da = a.pubDate?.toDate ? a.pubDate.toDate() : new Date(a.pubDate||0);
    const db = b.pubDate?.toDate ? b.pubDate.toDate() : new Date(b.pubDate||0);
    return db-da;
  });
}

function MediaExposureChart({ news }) {
  const data = useMemo(() => {
    const map = {};
    news.forEach(n => {
      const m = n.mediaName || n.sourceName || '其他';
      if (!map[m]) map[m] = { media:m, transcend:0, competitor:0 };
      if (n.cat==='transcend') map[m].transcend++;
      else if (n.cat==='competitor') map[m].competitor++;
    });
    return Object.values(map)
      .filter(r => r.transcend+r.competitor > 0)
      .sort((a,b) => (b.transcend+b.competitor)-(a.transcend+a.competitor))
      .slice(0,8);
  }, [news]);

  return (
    <Card title="媒體曝光佔比 — 創見 vs 競品（近 30 天）" icon="📊">
      {data.length > 0 ? (
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={data} layout="vertical" margin={{ top:0, right:12, left:0, bottom:0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" horizontal={false} />
            <XAxis type="number" tick={{ fill:'#6b7280', fontSize:11 }} axisLine={false} tickLine={false} />
            <YAxis type="category" dataKey="media" tick={{ fill:'#9ca3af', fontSize:11 }} width={64} axisLine={false} tickLine={false} />

            <Legend wrapperStyle={{ fontSize:11, color:'#9ca3af', paddingTop:8 }} />
            <Bar dataKey="transcend" name="創見" fill={BRAND}    radius={[0,4,4,0]} maxBarSize={12} />
            <Bar dataKey="competitor" name="競品" fill="#374151" radius={[0,4,4,0]} maxBarSize={12} />
          </BarChart>
        </ResponsiveContainer>
      ) : (
        <div className="h-40 flex items-center justify-center text-gray-600 text-sm">資料載入中…</div>
      )}
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════
// IR TAB — 情緒圓餅圖
// ═══════════════════════════════════════════════════════════
function SentimentPie({ news }) {
  const data = useMemo(() => {
    const items = news.filter(n => n.cat==='transcend');
    const cnt = { positive:0, neutral:0, negative:0 };
    items.forEach(n => { const s = n.sentiment||getSentiment(n.title,n.content); if(s in cnt) cnt[s]++; });
    const total = items.length || 1;
    return [
      { name:'正面', value:Math.round(cnt.positive/total*100), color:'#22c55e' },
      { name:'中立', value:Math.round(cnt.neutral/total*100),  color:'#6b7280' },
      { name:'負面', value:Math.round(cnt.negative/total*100), color:'#ef4444' },
    ];
  }, [news]);

  const total = news.filter(n=>n.cat==='transcend').length;

  return (
    <Card title="產業情緒分佈（創見相關報導）" icon="🧭">
      <div className="flex items-center gap-2">
        <ResponsiveContainer width="54%" height={170}>
          <PieChart>
            <Pie data={data} cx="50%" cy="50%" innerRadius={44} outerRadius={70}
              paddingAngle={3} dataKey="value" startAngle={90} endAngle={-270}>
              {data.map((d,i) => <Cell key={i} fill={d.color} stroke="transparent" />)}
            </Pie>
            <Tooltip {...TT} formatter={v=>[`${v}%`]} />
          </PieChart>
        </ResponsiveContainer>
        <div className="flex flex-col gap-3 flex-1">
          {data.map(d => (
            <div key={d.name} className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background:d.color }} />
                <span className="text-sm text-gray-300">{d.name}</span>
              </div>
              <span className="text-sm font-bold tabular-nums" style={{ color:d.color }}>{d.value}%</span>
            </div>
          ))}
          <p className="text-xs text-gray-600 mt-1">共分析 {total} 篇報導</p>
        </div>
      </div>
    </Card>
  );
}

  );

const TIME_FILTERS = [
  { id:'today', label:'今天' },
  { id:'week',  label:'本週' },
  { id:'month', label:'本月' },
  { id:'year',  label:'本年' },
  { id:'all',   label:'全部' },
];

function PRTab({ news }) {
  const [timeFilter, setTimeFilter] = useState('month');

  const transcend = useMemo(() => {
    const now = new Date();
    const cutoffs = {
      today: new Date(now.getFullYear(), now.getMonth(), now.getDate()),
      week:  new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000),
      month: new Date(now.getFullYear(), now.getMonth(), 1),
      year:  new Date(now.getFullYear(), 0, 1),
      all:   null,
    };
    const cutoff = cutoffs[timeFilter];
    return sortByDate(news.filter(n => {
      if (n.cat !== 'transcend') return false;
      // 標題或內文必須包含「創見」或「Transcend」
      const text = (n.title + ' ' + (n.content || '')).toLowerCase();
      if (!text.includes('創見') && !text.includes('transcend')) return false;
      // 時間篩選
      if (cutoff) {
        const d = n.pubDate?.toDate ? n.pubDate.toDate() : new Date(n.pubDate || 0);
        if (d < cutoff) return false;
      }
      return true;
    })).slice(0, 50);
  }, [news, timeFilter]);

  return (
    <div className="space-y-4 fade-in">
      <MediaExposureChart news={news} />
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card title="創見最新報導" icon="📰" className="h-full">
          {/* 時間篩選 */}
          <div className="flex gap-1.5 mb-3">
            {TIME_FILTERS.map(f => (
              <TabBtn key={f.id} active={timeFilter===f.id} onClick={() => setTimeFilter(f.id)}>
                {f.label}
              </TabBtn>
            ))}
          </div>
          {transcend.length > 0
            ? <div className="space-y-2">{transcend.map((n,i) => <NewsCard key={n.id||i} article={n} />)}</div>
            : <div className="h-32 flex items-center justify-center text-gray-600 text-sm">
                {news.length > 0 ? '此區間暫無符合報導' : '載入中…'}
              </div>
          }
        </Card>
        <CompetitorNews news={news} />
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [tab,       setTab]       = useState('pr');
  const [news,      setNews]      = useState([]);
  const [stocks,    setStocks]    = useState({});
  const [loading,   setLoading]   = useState(true);
  const [connected, setConnected] = useState(false);
  const [updated,   setUpdated]   = useState(null);
  const [aiOpen,    setAiOpen]    = useState(false);
  const [aiText,    setAiText]    = useState('');
  const [aiLoading, setAiLoading] = useState(false);

  // ─── Firebase init ───────────────────────────────────────
  useEffect(() => {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      window._db = firebase.firestore();
      setConnected(true);
      fetchAll();
    } catch(e) {
      console.error('Firebase:', e);
      setLoading(false);
    }
  }, []);

  async function fetchAll() {
    setLoading(true);
    await Promise.all([ fetchNews(), fetchStocks() ]);
    setLoading(false);
    setUpdated(new Date());
  }

  async function fetchNews() {
    try {
      const snap = await window._db.collection('news')
        .where('pubDate', '>=', new Date('2026-01-01T00:00:00+08:00'))
        .orderBy('pubDate', 'desc')
        .limit(2000)
        .get();
      setNews(snap.docs.map(d => ({ id:d.id, ...d.data() })));
    } catch(e) { console.error('News:', e); }
  }

  async function fetchStocks() {
    try {
      const doc = await window._db.collection('stocks').doc('latest').get();
      if (doc.exists) setStocks(doc.data());
    } catch(e) { console.error('Stocks:', e); }
  }

  // ─── AI Summary (Gemini) ─────────────────────────────────
  async function openAI() {
    setAiOpen(true);
    setAiLoading(true);
    setAiText('');
    try {
      const recent = sortByDate(news.filter(n=>n.cat==='transcend')).slice(0,20);
      const prompt = `你是創見資訊（2451）的公關顧問。分析以下近期新聞，給出：
1. 本週最值得關注的 3 則新聞及原因
2. 整體媒體情緒（正面/中立/負面比例與原因）
3. 建議公關行動
新聞資料：\n${recent.map(n=>`- [${n.mediaName||''}] ${n.title}`).join('\n')}`;

      const res = await fetch(GEMINI_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ contents:[{ parts:[{ text:prompt }] }] })
      });
      const json = await res.json();
      setAiText(json.candidates?.[0]?.content?.parts?.[0]?.text || '無法取得回應');
    } catch(e) {
      setAiText('AI 摘要失敗：' + e.message);
    }
    setAiLoading(false);
  }

  // 社群資料（cat=community，PTT Stock 討論創見/2451）
  const community = useMemo(() =>
    sortByDate(news.filter(n => n.cat === 'community')),
    [news]
  );

  const self = stocks['2451'];
  const updatedStr = updated ? updated.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '';

  return (
    <div className="min-h-screen text-white" style={{ background:'#030712', fontFamily:"'Segoe UI',system-ui,sans-serif" }}>

      {/* ─────────── HEADER ─────────── */}

.5,9.2-4.6,14.3-14.1,12.6-22.3,0,0-7.6,0-7.6,0Z"/>
            </svg>
            <div className="border-l border-white/20 pl-3 hidden sm:block">
              <p className="text-xs font-bold text-white/90 leading-tight tracking-wide">新聞監控</p>
